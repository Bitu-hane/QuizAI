services:
  - type: web
    name: quizai-telegram-bot
    env: node
    buildCommand: npm install && npm run build
    startCommand: node dist/bot.js
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: BOT_TOKEN
        sync: false  # Will be set in dashboard
      - key: API_BASE_URL
        sync: false
      - key: CHAPA_PROVIDER_TOKEN
        sync: false